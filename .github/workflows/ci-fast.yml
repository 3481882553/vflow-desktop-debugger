name: CI Fast

on:
  push:
    branches:
      - main
      - master
      - "feature/**"
  pull_request:

jobs:
  fast-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit and integration tests
        run: npm run test

      - name: E2E fallback (cloud no-device safe)
        run: xvfb-run -a npm run test:e2e:mock
