name: CI Upgrade Matrix

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  compatibility:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
        scenario: ["baseline", "playwright-latest", "electron-latest"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux runtime deps for Playwright/Electron
        run: npx playwright install-deps

      - name: Upgrade Playwright (compat probe)
        if: matrix.scenario == 'playwright-latest'
        run: npm install -D @playwright/test@latest

      - name: Upgrade Electron (compat probe)
        if: matrix.scenario == 'electron-latest'
        run: npm install -D electron@latest

      - name: Build
        run: npm run build

      - name: Unit and integration tests
        run: npm run test

      - name: E2E mock fallback
        run: xvfb-run -a npm run test:e2e:mock
